services:
  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://projectbowl:projectbowl@postgres:5432/projectbowl?schema=public
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    container_name: projectbowl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: projectbowl
      POSTGRES_PASSWORD: projectbowl
      POSTGRES_DB: projectbowl
    ports:
      - "5432:5432"
    volumes:
      - projectbowl-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projectbowl -d projectbowl"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  projectbowl-postgres-data:
